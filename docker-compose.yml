networks:
  lims_network:
    driver: bridge

volumes:
  postgres_data:
  pgadmin_data:
  caddy_data:
  caddy_config:

services:
  db:
    image: postgres:15
    container_name: aquacheck_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lims_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lims_pass}
      POSTGRES_DB: ${POSTGRES_DB:-lims_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lims_network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-lims_user} -d
            ${POSTGRES_DB:-lims_db}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aquacheck_backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8088:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://lims_user:lims_pass@db:5432/lims_db}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-super-secret-key-123}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-480}
    volumes:
      - ./backend:/app
      - ./docs:/app/docs_source:ro # read-only source for initial content import
    depends_on:
      db:
        condition: service_healthy
    networks:
      - lims_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://lim.aquachecklab.com/api}
    container_name: aquacheck_frontend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3002:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://lim.aquachecklab.com/api}
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      - backend
    networks:
      - lims_network

  db_backup:
    image: prodrigestivill/postgres-backup-local:15
    container_name: aquacheck_db_backup
    restart: unless-stopped
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: ${POSTGRES_DB:-lims_db}
      POSTGRES_USER: ${POSTGRES_USER:-lims_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lims_pass}
      POSTGRES_EXTRA_OPTS: "-Z6 --schema=public --blobs"
      SCHEDULE: ${BACKUP_SCHEDULE:-@daily}
      BACKUP_KEEP_DAYS: ${BACKUP_KEEP_DAYS:-7}
      BACKUP_KEEP_WEEKS: ${BACKUP_KEEP_WEEKS:-4}
      BACKUP_KEEP_MONTHS: ${BACKUP_KEEP_MONTHS:-6}
      HEALTHCHECK_PORT: 8080
    volumes:
      - ./backups:/backups
    depends_on:
      db:
        condition: service_healthy
    networks:
      - lims_network

  caddy:
    build:
      context: ./caddy
      dockerfile: Dockerfile
    container_name: aquacheck_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
    networks:
      - lims_network
