version: "3.9"

networks:
  lims_network:
    driver: bridge

volumes:
  postgres_data:
  pgadmin_data:

services:
  db:
    image: postgres:15
    container_name: aquacheck_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lims_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lims_pass}
      POSTGRES_DB: ${POSTGRES_DB:-lims_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lims_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lims_user} -d ${POSTGRES_DB:-lims_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: aquacheck_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@aquacheck.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy
    networks:
      - lims_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aquacheck_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://lims_user:lims_pass@db:5432/lims_db}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-super-secret-key-123}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-480}
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - lims_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aquacheck_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      - backend
    networks:
      - lims_network
